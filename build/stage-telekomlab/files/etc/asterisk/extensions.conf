; TelekomLab – interner Dialplan (20 Nebenstellen)
[general]
static=yes
writeprotect=no

[intern]
; Direktwahl 10xx
exten => _10XX,1,NoOp(Direktwahl zu ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},20)
 same => n,Hangup()

; Rufgruppe 2000 (ring-all)
exten => 2000,1,NoOp(Rufgruppe 1001–1020)
 same => n,Dial(PJSIP/1001&PJSIP/1002&PJSIP/1003&PJSIP/1004&PJSIP/1005&PJSIP/1006&PJSIP/1007&PJSIP/1008&PJSIP/1009&PJSIP/1010&PJSIP/1011&PJSIP/1012&PJSIP/1013&PJSIP/1014&PJSIP/1015&PJSIP/1016&PJSIP/1017&PJSIP/1018&PJSIP/1019&PJSIP/1020,25)
 same => n,Hangup()
