name: TELEKOMLAB Build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show runner & docker
        run: |
          uname -a
          docker --version || true
          docker info -f '{{.ServerVersion}}' || true
          pwd; ls -la
          ls -la build || true

      - name: Enable QEMU (arm & arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      - name: Normalize line endings (dos2unix)
        run: |
          sudo apt-get update
          sudo apt-get install -y dos2unix
          find . -type f -name "*.sh" -print0 | xargs -0 dos2unix || true
          find . -type f -name "*.sh" -print0 | xargs -0 chmod +x || true

      - name: Run TELEKOMLAB build
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          SKIP_BINFMT: "1"
        run: |
          set -x
          cd build
          ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telekomlab-images
          path: |
            pi-gen/deploy/**
            output/**
