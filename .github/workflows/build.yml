name: TELEKOMLAB Build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Nur anzeigen, ob Docker auf dem Runner verfügbar ist
      - name: Show runner & docker
        run: |
          uname -a
          docker --version
          docker info -f '{{.ServerVersion}}'

      # QEMU für ARM aktivieren (offizielles Action-Plugin, kein systemctl)
      - name: Enable QEMU (arm & arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm,arm64

      # Skripte ausführbar machen (falls Upload CRLF hatte)
      - name: Make scripts executable
        run: |
          find . -name "*.sh" -exec chmod +x {} \;

      # Deinen Build starten (Docker ist auf GitHub bereits vorinstalliert)
      - name: Run TELEKOMLAB build
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
          SKIP_BINFMT: "1"     # Host-Check überspringen; QEMU ist per Action aktiv
        run: |
          cd build
          ./build.sh

      # Ergebnis(e) hochladen
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telekomlab-images
          path: |
            pi-gen/deploy/**
            output/**
          if-no-files-found: warn
