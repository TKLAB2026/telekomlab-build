name: TELEKOMLAB Build

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install base tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-user-static binfmt-support rsync dosfstools xz-utils zip unzip \
            coreutils quilt parted debootstrap zerofree pxz file curl git bc bison flex

      - name: Enable QEMU support
        run: |
          docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Install Docker
        run: |
          curl -fsSL https://get.docker.com | sh
          sudo systemctl start docker

      - name: Make scripts executable
        run: |
          find . -name "*.sh" -exec chmod +x {} \;

      - name: Run TELEKOMLAB build
        env:
          DOCKER_DEFAULT_PLATFORM: linux/amd64
        run: |
          cd build
          ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telekomlab-images
          path: |
            pi-gen/deploy/**
            output/**
